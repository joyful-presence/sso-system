<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | Joyfully Present Account</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="booking.css">
</head>
<body>

<main>
  <section class="page-hero">
    <div class="wrap">
      <a href="https://joyfullypresent.life" style="display:inline-flex; align-items:center; gap:10px; text-decoration:none; margin-bottom:20px;">
        <img src="https://joyfullypresent.life/logo.png" alt="Joyfully Present Life Coaching" style="height:32px;">
      </a>
      <span class="eyebrow">Your Account</span>
      <h1>Reset your password</h1>
      <p class="lead">Enter your email and we'll send you a link to set a new password.</p>
    </div>
  </section>

  <section>
    <div class="wrap narrow">
      <div id="error-box"></div>
      <div id="form-view">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>
        <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="doForgot()">Send Reset Link</button>
      </div>
      <div id="success-view" style="display:none;">
        <div class="success-box">
          <div class="check">&#10003;</div>
          <h2>Check your email</h2>
          <p>If an account exists for that email, a reset link is on its way. It's valid for 30 minutes.</p>
          <a href="login.html" class="btn btn-primary">Back to Sign In</a>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="sso-config.js"></script>
<script>
function showError(msg) {
  document.getElementById("error-box").innerHTML = msg ? `<div class="error-note">${msg}</div>` : "";
}

async function doForgot() {
  showError("");
  const email = document.getElementById("email").value.trim();
  if (!email) { showError("Please enter your email."); return; }

  await fetch(`${SSO_API_BASE}/forgot-password`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email }),
  });

  document.getElementById("form-view").style.display = "none";
  document.getElementById("success-view").style.display = "block";
}
</script>

</body>
</html>
