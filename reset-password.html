<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | Joyfully Present Account</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="booking.css">
</head>
<body>

<main>
  <section class="page-hero">
    <div class="wrap">
      <a href="https://joyfullypresent.life" style="display:inline-flex; align-items:center; gap:10px; text-decoration:none; margin-bottom:20px;">
        <img src="https://joyfullypresent.life/logo.png" alt="Joyfully Present Life Coaching" style="height:32px;">
      </a>
      <span class="eyebrow">Your Account</span>
      <h1>Set a new password</h1>
    </div>
  </section>

  <section>
    <div class="wrap narrow">
      <div id="error-box"></div>
      <div id="form-view">
        <div class="form-group">
          <label for="password">New password</label>
          <input type="password" id="password" required minlength="8">
          <span class="small-note">At least 8 characters.</span>
        </div>
        <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="doReset()">Set New Password</button>
      </div>
      <div id="success-view" style="display:none;">
        <div class="success-box">
          <div class="check">&#10003;</div>
          <h2>Password updated</h2>
          <a href="login.html" class="btn btn-primary">Sign In</a>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="sso-config.js"></script>
<script>
const token = new URLSearchParams(location.search).get("token");

function showError(msg) {
  document.getElementById("error-box").innerHTML = msg ? `<div class="error-note">${msg}</div>` : "";
}

if (!token) {
  showError("This reset link is missing its token — please request a new one from the Forgot Password page.");
  document.getElementById("form-view").style.display = "none";
}

async function doReset() {
  showError("");
  const password = document.getElementById("password").value;
  if (password.length < 8) { showError("Password needs to be at least 8 characters."); return; }

  const res = await fetch(`${SSO_API_BASE}/reset-password`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token, password }),
  });
  const data = await res.json();
  if (!res.ok) { showError(data.error || "Could not reset password."); return; }

  document.getElementById("form-view").style.display = "none";
  document.getElementById("success-view").style.display = "block";
}
</script>

</body>
</html>
